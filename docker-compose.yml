services:
  claude-safeway:
    image: ghcr.io/aldarondo/claude-safeway:latest
    container_name: claude-safeway
    restart: unless-stopped
    environment:
      - SAFEWAY_EMAIL=${SAFEWAY_EMAIL}
      - SAFEWAY_PASSWORD=${SAFEWAY_PASSWORD}
      - SAFEWAY_STORE_ID=${SAFEWAY_STORE_ID:-}
      - PORT=${PORT:-8773}
    volumes:
      - ./logs:/app/logs
    command: sh -c "node src/serve.js 2>&1 | tee -a /app/logs/app.log"
    network_mode: host
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
